name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            name: darwin-arm64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: win32-x64

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux: wry/tao 系统依赖
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Build native module
        run: npx napi build --platform --release --target ${{ matrix.target }}

      - name: Rename artifact
        shell: bash
        run: |
          node_file=$(ls *.node 2>/dev/null | head -1)
          if [ -n "$node_file" ]; then
            mv "$node_file" "taowry.${{ matrix.target }}.node"
            echo "Renamed to taowry.${{ matrix.target }}.node"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: taowry-${{ matrix.name }}
          path: taowry.${{ matrix.target }}.node

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List artifacts
        run: ls -la *.node

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.node'
          generate_release_notes: true
